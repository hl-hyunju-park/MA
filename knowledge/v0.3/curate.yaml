# Curation policy for the v0.3 KDB Life (KDB생명보험) DD data room.
#
# The committed source of truth for which files get ingested. As of 2026-06-30 this is a **FULL
# ingest** of the DD room (~1,520 files): the boilerplate bulk-drops were removed so every
# DD-relevant file is served. Only the two genuinely unopenable files stay excluded. Mirrors
# DEFAULT_EXCLUDE in src/stella_kb/wiki/data_room.py — keep the two in sync; data_room.load_policy()
# falls back to that constant when this file is absent.
#
# Each pattern is fnmatch'd against a file's POSIX path *relative to the corpus root* (NFC-normalized,
# so KO globs match macOS NFD filenames). A file is dropped if any `exclude` glob matches AND no
# `include` glob re-admits it (include is evaluated after exclude, so it rescues individual files
# from a bulk drop).
#
# To re-trim for a cheaper/faster build, restore any of these bulk-drops (counts are approximate):
#   - "*5.4. 영업계약*"          # 142 insurance-policy 약관 — product boilerplate
#   - "*2.6.3.*평가보고서*"       # 485 per-security appraisal reports (values are in the kept summary xlsx)
#   - "*4.1. 교육세*"  - "*4.4. 부가가치세*"  - "*4.5. 원천징수*"  - "*4.6. 지방세*"   # 394 routine tax filings
#   - "*1.3. 정관 및 사규*"       # 218 corporate bylaws/regulations — governance boilerplate

exclude:
  # Security-locked files — NOT boilerplate; we'd want them but nothing can open them, so exclude to
  # keep the build clean (no per-rebuild open-failure). The same series' other vintages did ingest.
  - "*유형자산, 투자부동산 연도별 세부명세서 (FY2023.4분기).xlsx"   # password-encrypted OOXML (AES); FY2024/FY2025 ingested
  - "*FY2022_법인세 세무조정계산서.pdf"                          # DRM-wrapped ("<DOCUMENT SAFER"); FY2021/2023/2024 ingested

# Re-admit specific files an exclude glob above would otherwise drop, e.g.:
#   - "*정관 20250331.pdf"     # keep the current articles of incorporation out of the bylaws bulk-drop
include: []
