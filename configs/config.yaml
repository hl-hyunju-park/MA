# Central non-secret configuration for the Stella KB project.
#
# Precedence per value:  environment variable  >  this file  >  built-in default
# (resolved by src/stella_kb/config.py). So any STELLA_*/MNA_*/RAGAS_* env var still
# overrides — scripts and per-run overrides keep working unchanged.
#
# SECRETS (DART_MCP_TOKEN, DART_API_KEY) are NOT here — they live in .env (gitignored).
# Point at an alternate file with the STELLA_CONFIG env var.

llm:
  # Shared gemma-4 vLLM (wiki build, agent synthesis, RAGAS judge, PDF vision).
  url: http://123.37.5.219:8001/v1        # env: STELLA_LLM_URL
  model: gemma-4-31B-it                    # env: STELLA_LLM_MODEL
  temperature: 0.0    # env: STELLA_LLM_TEMPERATURE — sampling temp for runtime chat() calls
                      #   (agent synthesis/route); the build's cached_chat stays fixed at 0.0 so a
                      #   config change never re-rolls the content-addressed wiki cache
  max_tokens: 512     # env: STELLA_LLM_MAXTOK  — chat() default output cap (per-call budgets win)
  timeout: 60         # env: STELLA_LLM_TIMEOUT — chat() default request timeout (s)
  tool:                                    # DART tool-calling agent (may differ from above)
    url: http://123.37.5.219:8001/v1       # env: STELLA_TOOL_LLM_URL
    model: gemma-4-31B-it                  # env: STELLA_TOOL_LLM_MODEL

concurrency:
  parse: 6            # env: STELLA_CONCURRENCY           (wiki parse_llm + compile)
  fanout: 4           # env: STELLA_FANOUT                (agent sub-question fan-out)
  eval_fanout: 8      # env: STELLA_EVAL_FANOUT           (eval workers / agent fanout)
  ragas: 6            # env: RAGAS_CONCURRENCY            (ragas async ascore)
  pdf_describe: 4     # env: MNA_PDF_DESCRIBE_CONCURRENCY (per-page vision calls)

parsing:
  max_table_pages: 80   # env: MNA_PARSE_MAX_TABLE_PAGES  (pdfplumber table-extract cap)

cache:
  pdf_vision: .cache/pdf_vision   # env: PDF_VISION_CACHE   (vision describe result cache)
  pdf_page_png: .cache/pages      # env: PDF_PAGE_PNG_CACHE  (rendered page PNGs)

dart:
  mcp_url: http://127.0.0.1:8003/sse   # env: DART_MCP_URL  (non-secret; token stays in .env)

agent:
  wiki_dir: knowledge/v0.2/wiki   # env: MNA_AGENT_WIKI  — the 'default' dataset the agent serves
  # Named dataset (wiki version) registry: id -> built wiki dir (index.json + pages/ + ledgers/).
  # The API selects one per request via the "dataset" payload param (a safe id, never a path).
  # Each corpus version is self-contained under knowledge/<version>/. Register a new one here after
  # building it (run_pipeline.sh with MNA_WIKI_DATA=knowledge/<version>).
  datasets:
    v0.1: knowledge/v0.1/wiki   # canonical Centroid valuation-model wiki (63-sheet model)
    v0.2: knowledge/v0.2/wiki       # v0.2 test corpus: Excel ledgers + CAESAR/LIFE/STELLA FDD decks
    v0.3: knowledge/v0.3/wiki       # KDB Life DD data room: dumped ledgers + page-capped PDFs (data_room.py)
  router_top_k: 5            # env: MNA_ROUTER_TOPK — max pages the router opens per round
  max_steps: 3               # env: MNA_MAX_STEPS — per-branch read budget (initial read + retries);
                             #   single source for both the direct run and the supervisor's wiki worker
  recursion_limit: 25        # env: MNA_RECURSION_LIMIT — LangGraph hard stop per run
  cross_ref_pair_cap: 3      # env: MNA_CROSSREF_CAP — max PDF↔Excel cross-ref partner pages per sub-Q
  tokens:                    # per-persona LLM output-token budgets (too tight → cut-off JSON →
                             #   empty parse → wasted retry; env: MNA_TOKENS_<PERSONA>)
    planner: 400
    router: 400
    retriever: 3000          #   the heavy one: full-row + narrative extraction
    verifier: 300
    synthesizer: 900
  timeouts:                  # per-call request timeouts in seconds (env: MNA_TIMEOUT_<KIND>)
    default: 120             #   planner/router/verifier (the _ask default)
    retriever: 240           #   big max_tokens → runs long on a loaded vLLM
    synthesizer: 120
  deterministic_retrieve: false  # env: MNA_DET_RETRIEVE — parse 'value [cell]' tables instead
                                 # of an LLM call per structured page; off pending a quality A/B
  # routes:                 # env: MNA_AGENT_ROUTES — explicit routes.yaml (single-dataset only)

# Hand-authored, version-controlled curation: per dataset version under knowledge/<version>/ —
# decks.yaml (build-time deck descriptions) + routes.yaml (query-time routing shortcuts). These
# are committed even though the rest of knowledge/ is gitignored (a .gitignore exception keeps the
# two yamls tracked). See src/stella_kb/config.py: curation_dir / wiki_decks_yaml / agent_routes_yaml.
# Paths resolve per-version from the wiki/data dir; envs MNA_AGENT_ROUTES / MNA_WIKI_DECKS pin an
# explicit file and are SINGLE-DATASET only (they override the per-version resolution for all).
curation:
  dir: knowledge            # env: MNA_CURATION_DIR — per-version files live at knowledge/<version>/
